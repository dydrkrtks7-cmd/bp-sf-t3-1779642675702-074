<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2185b"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1030" cy="182" r="54" fill="#e91e63" opacity="0.14"/>
    <circle cx="1103" cy="385" r="71" fill="#e91e63" opacity="0.19"/>
    <circle cx="530" cy="62" r="57" fill="#e91e63" opacity="0.09"/>
    <circle cx="770" cy="327" r="98" fill="#e91e63" opacity="0.11"/>
    <circle cx="1292" cy="609" r="62" fill="#e91e63" opacity="0.18"/>
    <circle cx="342" cy="222" r="41" fill="#e91e63" opacity="0.11"/>
    <rect x="952" y="342" width="42" height="49" rx="8" fill="#c2185b" opacity="0.05" transform="rotate(8, 432, 143)"/>
    <rect x="730" y="451" width="28" height="24" rx="8" fill="#c2185b" opacity="0.15" transform="rotate(8, 891, 272)"/>
    <rect x="958" y="186" width="90" height="45" rx="8" fill="#c2185b" opacity="0.09" transform="rotate(17, 12, 538)"/>
    <rect x="477" y="391" width="79" height="78" rx="8" fill="#c2185b" opacity="0.14" transform="rotate(24, 231, 114)"/>
    <rect x="494" y="691" width="93" height="64" rx="8" fill="#c2185b" opacity="0.09" transform="rotate(2, 191, 545)"/>
    <rect x="1137" y="233" width="96" height="78" rx="8" fill="#c2185b" opacity="0.11" transform="rotate(43, 290, 496)"/>
    <rect x="769" y="326" width="62" height="95" rx="8" fill="#c2185b" opacity="0.06" transform="rotate(34, 0, 267)"/>
    <rect x="470" y="80" width="88" height="84" rx="8" fill="#c2185b" opacity="0.08" transform="rotate(41, 287, 362)"/>
    <polygon points="147,429 220,575 74,575" fill="#e91e63" opacity="0.07"/>
    <polygon points="45,36 136,218 -46,218" fill="#e91e63" opacity="0.11"/>
    <polygon points="415,-191 508,-5 322,-5" fill="#e91e63" opacity="0.05"/>
    <polygon points="781,483 824,569 738,569" fill="#e91e63" opacity="0.10"/>

  <!-- Wave at bottom -->
  <path d="M0,576 C360,603 840,549 1200,576 L1200,630 L0,630Z" fill="#e91e63" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    화곡 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 주식투자
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fff3e0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fff3e0" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 화곡 셔츠룸 — 주식투자
  </text>
</svg>